<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>📅 일정 비서</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin:0; background:#f0f4ff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    textarea { font-family:inherit; }
    .pulse { animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function parseInput(raw) {
  const text = raw.trim();
  const now = new Date();
  let date = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let dateMatched = false;
  const dayMap = {'일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6};

  if (/오늘/.test(text)) dateMatched = true;
  else if (/내일|낼/.test(text))  { date.setDate(date.getDate()+1); dateMatched=true; }
  else if (/모레/.test(text))      { date.setDate(date.getDate()+2); dateMatched=true; }
  else if (/글피/.test(text))      { date.setDate(date.getDate()+3); dateMatched=true; }

  const wd = text.match(/(다음주|담주|이번주|이번\s?주|다음\s?주)?\s*([일월화수목금토])요일/);
  if (wd && !dateMatched) {
    const t = dayMap[wd[2]];
    const isNext = /다음|담/.test(wd[1]||'');
    let diff = (t - now.getDay() + 7) % 7;
    if (isNext) diff += 7;
    date = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diff);
    dateMatched = true;
  }

  if (!dateMatched) {
    const md = text.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
    const dOnly = text.match(/(\d{1,2})\s*일/);
    if (md) {
      date = new Date(now.getFullYear(), parseInt(md[1])-1, parseInt(md[2]));
      if (date < new Date(now.getFullYear(),now.getMonth(),now.getDate())) date.setFullYear(now.getFullYear()+1);
    } else if (dOnly) {
      date = new Date(now.getFullYear(), now.getMonth(), parseInt(dOnly[1]));
      if (date < new Date(now.getFullYear(),now.getMonth(),now.getDate())) date.setMonth(now.getMonth()+1);
    }
  }

  let hour=null, minute=0;
  const isAft = /오후|저녁|밤/.test(text);
  const isMor = /오전|아침|새벽/.test(text);
  const isNoon= /점심/.test(text);
  const hm = text.match(/(\d{1,2})\s*시\s*(\d{1,2})?\s*분?/);
  if (hm) {
    hour = parseInt(hm[1]);
    if (hm[2]) minute = parseInt(hm[2]);
    if (/(\d{1,2})\s*시\s*반/.test(text)) minute = 30;
    if (isAft && hour<12) hour+=12;
    else if (isNoon && hour<12) hour+=12;
    else if (isMor && hour===12) hour=0;
    else if (!isMor&&!isAft&&!isNoon&&hour>=1&&hour<=7) hour+=12;
  } else if (isNoon) hour=12;
  else if (/저녁/.test(text)) hour=19;
  else if (/아침/.test(text)) hour=8;

  const time = hour!==null
    ? `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`
    : null;

  let title = text
    .replace(/오늘|내일|낼|모레|글피/g,'')
    .replace(/(다음주|담주|이번주|이번\s?주|다음\s?주)?\s*[일월화수목금토]요일/g,'')
    .replace(/\d{1,2}\s*월\s*\d{1,2}\s*일/g,'')
    .replace(/\d{1,2}\s*일/g,'')
    .replace(/\d{1,2}\s*시\s*\d{1,2}\s*분?/g,'')
    .replace(/\d{1,2}\s*시\s*반?/g,'')
    .replace(/오전|오후|저녁|아침|점심|새벽|밤|에서|에|쯤/g,'')
    .trim();
  if (!title) title='일정';

  const ds = date;
  return {
    title: title.slice(0,40),
    date: `${ds.getFullYear()}-${String(ds.getMonth()+1).padStart(2,'0')}-${String(ds.getDate()).padStart(2,'0')}`,
    time
  };
}

function App() {
  const NOW = new Date();
  const todayStr = `${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}-${String(NOW.getDate()).padStart(2,'0')}`;
  const [curDate,  setCurDate]  = useState(new Date(NOW.getFullYear(), NOW.getMonth(), 1));
  const [events,   setEvents]   = useState([]);
  const [input,    setInput]    = useState('');
  const [selDay,   setSelDay]   = useState(null);
  const [toast,    setToast]    = useState(null);
  const [notifPerm,setNotifPerm]= useState('default');
  const [listening,setListening]= useState(false);
  const recRef  = useRef(null);
  const firedRef= useRef(new Set());

  useEffect(()=>{
    try { const s=localStorage.getItem('sched_v2'); if(s) setEvents(JSON.parse(s)); } catch{}
    if('Notification' in window) setNotifPerm(Notification.permission);
  },[]);
  useEffect(()=>{ try{localStorage.setItem('sched_v2',JSON.stringify(events));}catch{} },[events]);

  const toast_ = (msg)=>{ setToast(msg); setTimeout(()=>setToast(null),2600); };

  const askNotif = ()=>{
    if(!('Notification' in window)){toast_('이 브라우저는 알림 미지원');return;}
    Notification.requestPermission().then(p=>{ setNotifPerm(p); toast_(p==='granted'?'알림 켜짐 🔔':'알림 거부됨'); });
  };

  useEffect(()=>{
    const REM={'1d':86400000,'1h':3600000,'10m':600000};
    const LBL={'1d':'하루','1h':'1시간','10m':'10분'};
    const check=()=>{
      const now=Date.now();
      events.forEach(ev=>{
        if(!ev.time) return;
        const target=new Date(`${ev.date}T${ev.time}:00`).getTime();
        (ev.rem||[]).forEach(r=>{
          const at=target-REM[r], key=`${ev.id}-${r}`;
          if(now>=at&&now<at+60000&&!firedRef.current.has(key)){
            firedRef.current.add(key);
            toast_(`⏰ ${LBL[r]} 후: ${ev.title}`);
            if(notifPerm==='granted') new Notification(`⏰ ${LBL[r]} 후: ${ev.title}`,{body:`${ev.date} ${ev.time}`,tag:key});
          }
        });
      });
    };
    const t=setInterval(check,30000); check(); return()=>clearInterval(t);
  },[events,notifPerm]);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    const r=new SR(); r.lang='ko-KR'; r.interimResults=false; r.maxAlternatives=1;
    r.onresult=(e)=>{
      const t=e.results[0][0].transcript;
      setListening(false);
      const parsed=parseInput(t);
      const ev={id:Date.now(),...parsed,rem:['1d','1h','10m']};
      setEvents(prev=>[...prev,ev]);
      toast_(`🎤 등록: ${parsed.title} (${parsed.date.slice(5)} ${parsed.time||'시간미정'})`);
    };
    r.onerror=(e)=>{ setListening(false); toast_(e.error==='not-allowed'?'마이크 권한을 허용해주세요':'음성 인식 실패'); };
    r.onend=()=>setListening(false);
    recRef.current=r;
  },[]);

  const toggleVoice=()=>{
    if(!recRef.current){toast_('키보드 🎤 버튼을 사용하세요');return;}
    if(listening){recRef.current.stop();setListening(false);return;}
    try{recRef.current.start();setListening(true);toast_('듣고 있습니다 🎤');}
    catch{setListening(false);}
  };

  const addEvent=()=>{
    if(!input.trim()){toast_('일정을 입력해주세요');return;}
    const parsed=parseInput(input);
    setEvents(prev=>[...prev,{id:Date.now(),...parsed,rem:['1d','1h','10m']}]);
    toast_(`✅ 등록: ${parsed.title} (${parsed.date.slice(5)} ${parsed.time||'시간미정'})`);
    setInput('');
  };

  const delEvent=(id)=>setEvents(prev=>prev.filter(e=>e.id!==id));
  const toggleRem=(id,r)=>setEvents(prev=>prev.map(e=>{
    if(e.id!==id) return e;
    const rem=e.rem||[];
    return{...e,rem:rem.includes(r)?rem.filter(x=>x!==r):[...rem,r]};
  }));

  const fmtDate=s=>{const d=new Date(s);return`${d.getMonth()+1}월 ${d.getDate()}일`;};
  const fmtTime=t=>{
    if(!t) return '시간 미정';
    const[h,m]=t.split(':').map(Number);
    const p=h>=12?'오후':'오전';
    const dh=h>12?h-12:h===0?12:h;
    return`${p} ${dh}:${String(m).padStart(2,'0')}`;
  };
  const dow=s=>['일','월','화','수','목','금','토'][new Date(s).getDay()];

  const y=curDate.getFullYear(), mo=curDate.getMonth();
  const dim=new Date(y,mo+1,0).getDate();
  const fd=new Date(y,mo,1).getDay();
  const cells=[];
  for(let i=0;i<fd;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  const byDay={};
  events.forEach(ev=>{
    if(ev.date.startsWith(`${y}-${String(mo+1).padStart(2,'0')}`)){
      const d=parseInt(ev.date.split('-')[2]);
      (byDay[d]=byDay[d]||[]).push(ev);
    }
  });

  const isCurMon=y===NOW.getFullYear()&&mo===NOW.getMonth();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const RL={'1d':'1일 전','1h':'1시간 전','10m':'10분 전'};

  const upcoming=[...events]
    .filter(e=>new Date(`${e.date}T${e.time||'00:00'}`)>=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()))
    .sort((a,b)=>new Date(`${a.date}T${a.time||'00:00'}`)-new Date(`${b.date}T${b.time||'00:00'}`));

  const selEvents=selDay
    ?events.filter(e=>e.date===`${y}-${String(mo+1).padStart(2,'0')}-${String(selDay).padStart(2,'0')}`)
    :[];

  return (
    <div className="min-h-screen bg-gradient-to-b from-slate-50 to-blue-50 pb-36">
      <div className="bg-white shadow-sm px-4 py-3 sticky top-0 z-20">
        <div className="flex items-center justify-between max-w-lg mx-auto">
          <div className="flex items-center gap-2">
            <span className="text-2xl">📅</span>
            <span className="text-lg font-bold text-gray-800">일정 비서</span>
          </div>
          <button onClick={askNotif}
            className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${notifPerm==='granted'?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}`}>
            🔔 {notifPerm==='granted'?'알림 ON':'알림 켜기'}
          </button>
        </div>
      </div>

      <div className="max-w-lg mx-auto px-3 pt-3 space-y-3">
        <div className="bg-white rounded-2xl shadow-sm p-4">
          <div className="flex items-center justify-between mb-3">
            <button onClick={()=>setCurDate(new Date(y,mo-1,1))}
              className="w-9 h-9 flex items-center justify-center hover:bg-gray-100 rounded-full text-xl font-bold text-gray-600">‹</button>
            <h2 className="text-base font-bold text-gray-800">{y}년 {MN[mo]}</h2>
            <button onClick={()=>setCurDate(new Date(y,mo+1,1))}
              className="w-9 h-9 flex items-center justify-center hover:bg-gray-100 rounded-full text-xl font-bold text-gray-600">›</button>
          </div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {['일','월','화','수','목','금','토'].map((d,i)=>(
              <div key={d} className={`text-center text-xs font-bold py-1 ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-500'}`}>{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {cells.map((d,i)=>{
              const isToday=isCurMon&&d===NOW.getDate();
              const hasDot=d&&byDay[d]?.length>0;
              const isSel=d===selDay;
              return(
                <button key={i} onClick={()=>d&&setSelDay(isSel?null:d)} disabled={!d}
                  className={`aspect-square rounded-xl flex flex-col items-center justify-center text-sm font-medium transition
                    ${!d?'invisible':isSel?'bg-blue-600 text-white shadow':isToday?'bg-blue-100 text-blue-700 font-bold':'hover:bg-gray-100 text-gray-700'}`}>
                  <span className={!isSel&&i%7===0?'text-red-500':''}>{d}</span>
                  {hasDot&&<span className={`w-1.5 h-1.5 rounded-full mt-0.5 ${isSel?'bg-white':'bg-blue-500'}`}/>}
                </button>
              );
            })}
          </div>
        </div>

        {selDay&&(
          <div className="bg-white rounded-2xl shadow-sm p-4">
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-bold text-gray-800">{mo+1}월 {selDay}일 일정</h3>
              <button onClick={()=>setSelDay(null)} className="text-gray-400 text-xl leading-none">✕</button>
            </div>
            {selEvents.length===0
              ?<p className="text-sm text-gray-400">이날 일정이 없습니다</p>
              :<div className="space-y-2">{selEvents.map(ev=><EventCard key={ev.id} ev={ev} fmtTime={fmtTime} onDel={delEvent} onRem={toggleRem} RL={RL}/>)}</div>
            }
          </div>
        )}

        <div className="bg-white rounded-2xl shadow-sm p-4">
          <h3 className="font-bold text-gray-800 mb-2">다가오는 일정 ({upcoming.length})</h3>
          {upcoming.length===0
            ?<p className="text-sm text-gray-400">아래에서 일정을 추가해보세요!</p>
            :<div className="space-y-2 max-h-72 overflow-y-auto">
              {upcoming.map(ev=>(
                <div key={ev.id} className={`rounded-xl p-3 border ${ev.date===todayStr?'bg-blue-50 border-blue-200':'bg-gray-50 border-gray-100'}`}>
                  <div className="flex items-start gap-2">
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-gray-800 text-sm truncate">{ev.title}</div>
                      <div className="text-xs text-gray-500 mt-0.5">🕐 {fmtDate(ev.date)}({dow(ev.date)}) · {fmtTime(ev.time)}</div>
                      <div className="flex flex-wrap gap-1 mt-1.5">
                        {['1d','1h','10m'].map(r=>(
                          <button key={r} onClick={()=>toggleRem(ev.id,r)}
                            className={`text-[10px] px-2 py-0.5 rounded-full transition ${(ev.rem||[]).includes(r)?'bg-blue-600 text-white':'bg-gray-200 text-gray-500'}`}>
                            🔔 {RL[r]}
                          </button>
                        ))}
                      </div>
                    </div>
                    <button onClick={()=>delEvent(ev.id)} className="p-1.5 hover:bg-red-100 rounded-lg text-red-400 flex-shrink-0">🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          }
        </div>
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl z-20">
        <div className="max-w-lg mx-auto px-3 py-3">
          <div className="flex items-end gap-2">
            <textarea value={input} onChange={e=>setInput(e.target.value)} rows={1}
              placeholder="예: 내일 오후 3시 회의"
              className="flex-1 px-4 py-3 bg-gray-100 rounded-2xl resize-none text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
              style={{minHeight:'48px',maxHeight:'96px'}}
            />
            <button onClick={toggleVoice}
              className={`w-12 h-12 rounded-full flex items-center justify-center text-xl flex-shrink-0 transition ${listening?'bg-red-500 text-white pulse':'bg-gray-200 text-gray-600'}`}>
              🎤
            </button>
            <button onClick={addEvent}
              className="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-700 text-white flex items-center justify-center text-2xl flex-shrink-0">
              ＋
            </button>
          </div>
          <p className="text-[11px] text-gray-400 mt-1 text-center">🎤 누르고 말하면 바로 등록 | 예: "다음주 월요일 9시 회의"</p>
        </div>
      </div>

      {toast&&(
        <div className="fixed bottom-28 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white text-sm px-5 py-2.5 rounded-full shadow-xl max-w-xs text-center">
          {toast}
        </div>
      )}
    </div>
  );
}

function EventCard({ev,fmtTime,onDel,onRem,RL}) {
  return(
    <div className="bg-gray-50 rounded-xl p-3 border border-gray-100">
      <div className="flex items-start gap-2">
        <div className="flex-1 min-w-0">
          <div className="font-semibold text-sm text-gray-800">{ev.title}</div>
          <div className="text-xs text-gray-500 mt-0.5">🕐 {fmtTime(ev.time)}</div>
          <div className="flex flex-wrap gap-1 mt-1.5">
            {['1d','1h','10m'].map(r=>(
              <button key={r} onClick={()=>onRem(ev.id,r)}
                className={`text-[10px] px-2 py-0.5 rounded-full transition ${(ev.rem||[]).includes(r)?'bg-blue-600 text-white':'bg-gray-200 text-gray-500'}`}>
                🔔 {RL[r]}
              </button>
            ))}
          </div>
        </div>
        <button onClick={()=>onDel(ev.id)} className="p-1.5 hover:bg-red-100 rounded-lg text-red-400">🗑️</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
